name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js setup
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Dependencies installieren
        run: npm install
        working-directory: functions

      - name: Firebase Functions deployen
        run: npx firebase-tools deploy --only functions --project todoliste-badfd --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
