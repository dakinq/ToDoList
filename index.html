<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wir zwei – To-dos</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Todos">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap');

  :root {
    --paper: #F7F3ED;
    --ink: #2E2A26;
    --line: #DDD4C7;
    --sage: #6B7C63;
    --clay: #B5654A;
    --gold: #C9A24B;
    --red: #B23A2E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px 80px;
  }

  .sheet { width: 100%; max-width: 560px; }

  header { text-align: center; margin-bottom: 20px; position: relative; }

  .eyebrow {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--sage); font-weight: 700;
  }

  h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 40px;
    margin: 6px 0 4px; font-style: italic;
  }

  .sub { font-size: 14px; color: #7a7268; }

  .topbar { display: flex; justify-content: center; gap: 16px; align-items: center; margin-bottom: 20px; }
  .icon-btn {
    background: white; border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--ink);
    font-family: 'Karla', sans-serif;
  }
  .icon-btn:hover { border-color: var(--sage); }

  /* Login */
  .login-box {
    background: white; border: 1px solid var(--line); border-radius: 14px;
    padding: 28px 24px; box-shadow: 0 2px 0 var(--line);
    display: flex; flex-direction: column; gap: 12px;
  }
  .login-box input, .composer input, .composer select, .modal input, .modal select {
    border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px;
    font-family: 'Karla', sans-serif; font-size: 15px; outline: none;
    background: var(--paper); color: var(--ink);
  }
  .login-box input:focus, .composer input:focus, .composer select:focus { border-color: var(--sage); }
  .login-box button, .composer .add, .modal button.primary {
    border: none; background: var(--clay); color: white; border-radius: 8px;
    padding: 11px; font-family: 'Karla', sans-serif; font-weight: 700;
    font-size: 15px; cursor: pointer; transition: background 0.15s ease;
  }
  .login-box button:hover, .composer .add:hover, .modal button.primary:hover { background: #a1573f; }
  .login-error { color: var(--clay); font-size: 13px; text-align: center; min-height: 16px; }

  /* Composer */
  .composer {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px;
    background: white; border: 1px solid var(--line); border-radius: 14px;
    padding: 12px; box-shadow: 0 2px 0 var(--line);
  }
  .composer input[type="text"] { flex: 1 1 100%; }
  .composer select, .composer input[type="date"] { flex: 1 1 30%; font-size: 13px; }
  .composer .add { flex: 1 1 100%; }

  .list { display: flex; flex-direction: column; gap: 10px; }

  .item {
    display: flex; align-items: flex-start; gap: 12px; background: white;
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    animation: rise 0.25s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .item.done { opacity: 0.5; }
  .item.overdue { border-color: var(--red); }

  .checkbox {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--sage);
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-top: 2px; background: white; transition: background 0.15s ease;
  }
  .checkbox.checked { background: var(--sage); }
  .checkbox.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: bold; }

  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 15px; line-height: 1.4; word-break: break-word; }
  .item.done .item-text { text-decoration: line-through; }

  .meta { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.02em; }
  .tag.category { background: #E6EBE3; color: var(--sage); }
  .tag.assignee { background: #F2E2DB; color: var(--clay); }
  .tag.due { background: #EFE6D8; color: var(--gold); }
  .tag.due.overdue { background: #F6DAD5; color: var(--red); }

  .del {
    border: none; background: transparent; color: #bbb1a3; font-size: 18px;
    cursor: pointer; line-height: 1; padding: 2px 4px; flex-shrink: 0;
  }
  .del:hover { color: var(--clay); }

  .empty {
    text-align: center; padding: 48px 20px; color: #a89d8d;
    font-family: 'Fraunces', serif; font-style: italic; font-size: 17px;
  }

  .footer-note { text-align: center; font-size: 12px; color: #a89d8d; margin-top: 28px; }
  .hidden { display: none !important; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(46,42,38,0.4);
    display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10;
  }
  .modal {
    background: var(--paper); border-radius: 14px; padding: 24px;
    width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal h2 { font-family: 'Fraunces', serif; font-style: italic; margin: 0; font-size: 22px; }
  .modal-section { display: flex; flex-direction: column; gap: 8px; }
  .modal-section label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sage); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: white; border: 1px solid var(--line); border-radius: 20px;
    padding: 4px 10px; font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .chip button { border: none; background: none; color: #bbb1a3; cursor: pointer; font-size: 14px; line-height: 1; }
  .chip button:hover { color: var(--clay); }
  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; }
  .add-row button { border: none; background: var(--sage); color: white; border-radius: 8px; padding: 0 14px; cursor: pointer; font-weight: 700; }
  .modal button.secondary {
    border: 1px solid var(--line); background: white; color: var(--ink);
    border-radius: 8px; padding: 10px; cursor: pointer; font-family: 'Karla', sans-serif;
  }
  .push-status { font-size: 12px; color: #7a7268; }
</style>
</head>
<body>
<div class="sheet">
  <header>
    <div class="eyebrow">Gemeinsam</div>
    <h1>Unsere To-dos</h1>
    <div class="sub" id="subline">Bitte anmelden</div>
  </header>

  <!-- Login -->
  <div id="loginView" class="login-box">
    <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
    <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
    <button id="loginBtn">Anmelden</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- App -->
  <div id="appView" class="hidden">
    <div class="topbar">
      <button class="icon-btn" id="settingsBtn">⚙ Einstellungen</button>
      <button class="icon-btn" id="signoutBtn">Abmelden</button>
    </div>

    <div class="composer">
      <input id="textInput" type="text" placeholder="Was steht an?" maxlength="200">
      <select id="categoryInput"></select>
      <select id="assigneeInput"></select>
      <input id="dueInput" type="date">
      <button class="add" id="addBtn">Hinzufügen</button>
    </div>

    <div class="list" id="list"></div>
    <div class="push-status" id="pushStatus"></div>
  </div>

  <div class="footer-note">Nur ihr beide habt Zugriff – geschützt über Firebase-Login.</div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Einstellungen</h2>

    <div class="modal-section">
      <label>Kategorien</label>
      <div class="chip-row" id="categoryChips"></div>
      <div class="add-row">
        <input id="newCategoryInput" type="text" placeholder="Neue Kategorie" maxlength="30">
        <button id="addCategoryBtn">+</button>
      </div>
    </div>

    <div class="modal-section">
      <label>Zuweisungen</label>
      <div class="chip-row" id="assigneeChips"></div>
      <div class="add-row">
        <input id="newAssigneeInput" type="text" placeholder="Neuer Name" maxlength="30">
        <button id="addAssigneeBtn">+</button>
      </div>
    </div>

    <div class="modal-section">
      <label>Erinnerungen</label>
      <button class="secondary" id="enablePushBtn">Push-Benachrichtigungen aktivieren</button>
      <div class="push-status" id="pushStatusModal"></div>
    </div>

    <button class="primary" id="closeSettingsBtn">Fertig</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDfTQHSnhdX5-Z-3MCeDPpDeKXcuEbV1zE",
    authDomain: "todoliste-badfd.firebaseapp.com",
    projectId: "todoliste-badfd",
    storageBucket: "todoliste-badfd.firebasestorage.app",
    messagingSenderId: "764723309146",
    appId: "1:764723309146:web:75a7f9c88264a967c30663"
  };
  const VAPID_KEY = "BNpmdm1YDApJwKObfKF7s8HXIEen4jLAoK0oh7vOUjX-kZl7CKfOvG5net-cGWwDYFVbwkaLcBIhAeXfmvs6_9A";

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const todosRef = db.collection('todos');
  const configRef = db.collection('config');
  const tokensRef = db.collection('tokens');

  const DEFAULT_CATEGORIES = ['Freizeit'];
  const DEFAULT_ASSIGNEES = ['Partner A', 'Partner B', 'Beide'];

  // ---- Elements ----
  const loginView = document.getElementById('loginView');
  const appView = document.getElementById('appView');
  const subline = document.getElementById('subline');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const signoutBtn = document.getElementById('signoutBtn');
  const textInput = document.getElementById('textInput');
  const categoryInput = document.getElementById('categoryInput');
  const assigneeInput = document.getElementById('assigneeInput');
  const dueInput = document.getElementById('dueInput');
  const addBtn = document.getElementById('addBtn');
  const listEl = document.getElementById('list');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsModal = document.getElementById('settingsModal');
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  const categoryChips = document.getElementById('categoryChips');
  const assigneeChips = document.getElementById('assigneeChips');
  const newCategoryInput = document.getElementById('newCategoryInput');
  const newAssigneeInput = document.getElementById('newAssigneeInput');
  const addCategoryBtn = document.getElementById('addCategoryBtn');
  const addAssigneeBtn = document.getElementById('addAssigneeBtn');
  const enablePushBtn = document.getElementById('enablePushBtn');
  const pushStatus = document.getElementById('pushStatus');
  const pushStatusModal = document.getElementById('pushStatusModal');

  let unsubTodos = null;
  let unsubCategories = null;
  let unsubAssignees = null;
  let categories = [];
  let assignees = [];

  // ---- Auth ----
  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    loginError.textContent = '';
    loginBtn.disabled = true;
    try {
      await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
    } catch (e) {
      loginError.textContent = 'Anmeldung fehlgeschlagen. E-Mail oder Passwort prüfen.';
    }
    loginBtn.disabled = false;
  }

  signoutBtn.addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(user => {
    if (user) {
      loginView.classList.add('hidden');
      appView.classList.remove('hidden');
      subline.textContent = 'Angemeldet als ' + user.email;
      ensureDefaults().then(() => {
        subscribeToCategories();
        subscribeToAssignees();
        subscribeToTodos();
      });
    } else {
      loginView.classList.remove('hidden');
      appView.classList.add('hidden');
      subline.textContent = 'Bitte anmelden';
      if (unsubTodos) { unsubTodos(); unsubTodos = null; }
      if (unsubCategories) { unsubCategories(); unsubCategories = null; }
      if (unsubAssignees) { unsubAssignees(); unsubAssignees = null; }
    }
  });

  async function ensureDefaults() {
    const catDoc = await configRef.doc('categories').get();
    if (!catDoc.exists) await configRef.doc('categories').set({ items: DEFAULT_CATEGORIES });
    const asgDoc = await configRef.doc('assignees').get();
    if (!asgDoc.exists) await configRef.doc('assignees').set({ items: DEFAULT_ASSIGNEES });
  }

  // ---- Categories / Assignees (live) ----
  function subscribeToCategories() {
    unsubCategories = configRef.doc('categories').onSnapshot(doc => {
      categories = (doc.exists && doc.data().items) || [];
      renderSelect(categoryInput, categories);
      renderChips(categoryChips, categories, removeCategory);
    });
  }
  function subscribeToAssignees() {
    unsubAssignees = configRef.doc('assignees').onSnapshot(doc => {
      assignees = (doc.exists && doc.data().items) || [];
      renderSelect(assigneeInput, assignees);
      renderChips(assigneeChips, assignees, removeAssignee);
    });
  }

  function renderSelect(selectEl, items) {
    const current = selectEl.value;
    selectEl.innerHTML = '';
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item;
      opt.textContent = item;
      selectEl.appendChild(opt);
    });
    if (items.includes(current)) selectEl.value = current;
  }

  function renderChips(container, items, onRemove) {
    container.innerHTML = '';
    items.forEach(item => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      const span = document.createElement('span');
      span.textContent = item;
      const btn = document.createElement('button');
      btn.innerHTML = '&times;';
      btn.onclick = () => onRemove(item);
      chip.appendChild(span);
      chip.appendChild(btn);
      container.appendChild(chip);
    });
  }

  addCategoryBtn.addEventListener('click', async () => {
    const val = newCategoryInput.value.trim();
    if (!val || categories.includes(val)) return;
    newCategoryInput.value = '';
    await configRef.doc('categories').set({ items: [...categories, val] });
  });
  addAssigneeBtn.addEventListener('click', async () => {
    const val = newAssigneeInput.value.trim();
    if (!val || assignees.includes(val)) return;
    newAssigneeInput.value = '';
    await configRef.doc('assignees').set({ items: [...assignees, val] });
  });
  async function removeCategory(val) {
    await configRef.doc('categories').set({ items: categories.filter(c => c !== val) });
  }
  async function removeAssignee(val) {
    await configRef.doc('assignees').set({ items: assignees.filter(a => a !== val) });
  }

  settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
  closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

  // ---- Todos ----
  function subscribeToTodos() {
    if (unsubTodos) unsubTodos();
    unsubTodos = todosRef.onSnapshot(snapshot => {
      const todos = [];
      snapshot.forEach(doc => todos.push({ id: doc.id, ...doc.data() }));
      render(todos);
    }, err => console.error(err));
  }

  function render(todos) {
    listEl.innerHTML = '';
    if (todos.length === 0) {
      listEl.innerHTML = '<div class="empty">Noch nichts auf der Liste — fügt euren ersten Punkt hinzu.</div>';
      return;
    }
    const today = new Date(); today.setHours(0,0,0,0);

    const sorted = [...todos].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      const aDue = a.dueDate ? new Date(a.dueDate) : null;
      const bDue = b.dueDate ? new Date(b.dueDate) : null;
      if (aDue && bDue) return aDue - bDue;
      if (aDue && !bDue) return -1;
      if (!aDue && bDue) return 1;
      const aCreated = a.createdAt ? a.createdAt.toMillis() : 0;
      const bCreated = b.createdAt ? b.createdAt.toMillis() : 0;
      return aCreated - bCreated;
    });

    for (const todo of sorted) {
      const item = document.createElement('div');
      const dueDate = todo.dueDate ? new Date(todo.dueDate) : null;
      const isOverdue = dueDate && !todo.done && dueDate < today;
      item.className = 'item' + (todo.done ? ' done' : '') + (isOverdue ? ' overdue' : '');

      const checkbox = document.createElement('div');
      checkbox.className = 'checkbox' + (todo.done ? ' checked' : '');
      checkbox.onclick = () => toggleTodo(todo.id, !todo.done);

      const body = document.createElement('div');
      body.className = 'item-body';

      const textDiv = document.createElement('div');
      textDiv.className = 'item-text';
      textDiv.textContent = todo.text;

      const meta = document.createElement('div');
      meta.className = 'meta';

      if (todo.category) {
        const catTag = document.createElement('span');
        catTag.className = 'tag category';
        catTag.textContent = todo.category;
        meta.appendChild(catTag);
      }
      if (todo.assignee) {
        const asgTag = document.createElement('span');
        asgTag.className = 'tag assignee';
        asgTag.textContent = todo.assignee;
        meta.appendChild(asgTag);
      }
      if (todo.dueDate) {
        const dueTag = document.createElement('span');
        dueTag.className = 'tag due' + (isOverdue ? ' overdue' : '');
        const d = new Date(todo.dueDate);
        dueTag.textContent = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
        meta.appendChild(dueTag);
      }

      body.appendChild(textDiv);
      body.appendChild(meta);

      const delBtn = document.createElement('button');
      delBtn.className = 'del';
      delBtn.innerHTML = '&times;';
      delBtn.onclick = () => deleteTodo(todo.id);

      item.appendChild(checkbox);
      item.appendChild(body);
      item.appendChild(delBtn);
      listEl.appendChild(item);
    }
  }

  addBtn.addEventListener('click', addTodo);
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  async function addTodo() {
    const text = textInput.value.trim();
    if (!text) return;
    const user = auth.currentUser;
    if (!user) return;
    const payload = {
      text,
      done: false,
      category: categoryInput.value || null,
      assignee: assigneeInput.value || null,
      dueDate: dueInput.value || null,
      notified: false,
      authorEmail: user.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    textInput.value = '';
    dueInput.value = '';
    try {
      await todosRef.add(payload);
    } catch (e) {
      console.error('Hinzufügen fehlgeschlagen', e);
    }
  }

  async function toggleTodo(id, done) {
    try { await todosRef.doc(id).update({ done }); }
    catch (e) { console.error('Update fehlgeschlagen', e); }
  }

  async function deleteTodo(id) {
    try { await todosRef.doc(id).delete(); }
    catch (e) { console.error('Löschen fehlgeschlagen', e); }
  }

  // ---- Push notifications ----
  let messaging;
  try { messaging = firebase.messaging(); } catch (e) { messaging = null; }

  function setPushStatus(text) {
    pushStatus.textContent = text;
    pushStatusModal.textContent = text;
  }

  async function registerServiceWorkerAndToken() {
    if (!messaging) { setPushStatus('Push wird auf diesem Gerät/Browser nicht unterstützt.'); return; }
    try {
      const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        setPushStatus('Benachrichtigungen wurden nicht erlaubt.');
        return;
      }
      const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: registration });
      if (token) {
        const user = auth.currentUser;
        await tokensRef.doc(token).set({
          token,
          email: user ? user.email : null,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setPushStatus('Push-Benachrichtigungen aktiv ✓');
      } else {
        setPushStatus('Kein Token erhalten — Seite zum Home-Bildschirm hinzufügen und erneut versuchen.');
      }
    } catch (e) {
      console.error(e);
      setPushStatus('Fehler beim Aktivieren: ' + e.message);
    }
  }

  enablePushBtn.addEventListener('click', registerServiceWorkerAndToken);

  if (messaging) {
    messaging.onMessage(payload => {
      console.log('Nachricht im Vordergrund erhalten', payload);
    });
  }
</script>
</body>
</html>
