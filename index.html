<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bauer sucht Aufgabe</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bauer sucht Aufgabe">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap');

  :root {
    --paper: #F7F3ED;
    --ink: #2E2A26;
    --line: #DDD4C7;
    --sage: #6B7C63;
    --clay: #B5654A;
    --gold: #C9A24B;
    --red: #B23A2E;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px 80px;
  }

  .sheet { width: 100%; max-width: 560px; }

  /* Header */
  header { text-align: center; margin-bottom: 24px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--sage); font-weight: 700; margin-bottom: 10px; }
  .title-row { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .header-logo { width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px; margin: 0; font-style: italic; line-height: 1.15; text-align: left; }

  .topbar { display: flex; justify-content: center; gap: 16px; align-items: center; margin-bottom: 20px; }
  .icon-btn { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--ink); font-family: 'Karla', sans-serif; }
  .icon-btn:hover { border-color: var(--sage); }

  /* Login */
  .login-box { background: white; border: 1px solid var(--line); border-radius: 14px; padding: 28px 24px; box-shadow: 0 2px 0 var(--line); display: flex; flex-direction: column; gap: 12px; }
  .login-box input { border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; font-family: 'Karla', sans-serif; font-size: 15px; outline: none; background: var(--paper); color: var(--ink); }
  .login-box input:focus { border-color: var(--sage); }
  .remember-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #7a7268; }
  .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--sage); }
  .login-box button { border: none; background: var(--clay); color: white; border-radius: 8px; padding: 11px; font-family: 'Karla', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: background 0.15s; }
  .login-box button:hover { background: #a1573f; }
  .login-error { color: var(--clay); font-size: 13px; text-align: center; min-height: 16px; }

  /* Composer */
  .composer { background: white; border: 1px solid var(--line); border-radius: 14px; padding: 12px; box-shadow: 0 2px 0 var(--line); margin-bottom: 22px; display: flex; flex-direction: column; gap: 8px; }
  .composer input[type="text"] { border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; font-family: 'Karla', sans-serif; font-size: 15px; outline: none; background: var(--paper); color: var(--ink); width: 100%; }
  .composer input[type="text"]:focus { border-color: var(--sage); }
  .field-row { display: flex; gap: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sage); padding-left: 2px; }
  .field-group select, .field-group input[type="date"] { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-family: 'Karla', sans-serif; font-size: 13px; outline: none; background: var(--paper); color: var(--ink); width: 100%; }
  .field-group select:focus, .field-group input[type="date"]:focus { border-color: var(--sage); }
  .composer button.add { border: none; background: var(--clay); color: white; border-radius: 8px; padding: 11px; font-family: 'Karla', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: background 0.15s; width: 100%; }
  .composer button.add:hover { background: #a1573f; }

  /* List */
  .list { display: flex; flex-direction: column; gap: 10px; }

  .item {
    display: flex; align-items: flex-start; gap: 12px;
    background: white; border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px;
    animation: rise 0.25s ease;
    user-select: none; -webkit-user-select: none;
    transition: background 0.2s, border-color 0.2s;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Priorität färbt die ganze Kachel */
  .item.prio-1 { background: #FDE8E5; border-color: #D4776B; }
  .item.prio-2 { background: #FEF8E6; border-color: #C9A24B; }
  .item.prio-3 { background: #EAF2E6; border-color: #7EAD72; }
  .item.done { opacity: 0.45; }
  .item.overdue { border-color: var(--red) !important; }
  .item.pressing { filter: brightness(0.95); }

  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--sage); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; background: white; transition: background 0.15s; }
  .checkbox.checked { background: var(--sage); }
  .checkbox.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: bold; }

  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 15px; line-height: 1.4; word-break: break-word; }
  .item.done .item-text { text-decoration: line-through; }

  .meta { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.02em; }
  .tag.category { background: rgba(107,124,99,0.15); color: var(--sage); }
  .tag.assignee { background: rgba(181,101,74,0.15); color: var(--clay); }

  /* Datum prominent */
  .date-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700;
    background: rgba(201,162,75,0.18); color: #8a6c1a;
    border-radius: 8px; padding: 3px 10px;
    letter-spacing: 0.01em;
  }
  .date-badge.overdue { background: rgba(178,58,46,0.15); color: var(--red); }
  .date-badge-icon { font-size: 13px; }

  /* Prio-Label klein neben dem Text */
  .prio-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.65; }

  .del { border: none; background: transparent; color: #bbb1a3; font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 4px; flex-shrink: 0; }
  .del:hover { color: var(--clay); }

  .empty { text-align: center; padding: 48px 20px; color: #a89d8d; font-family: 'Fraunces', serif; font-style: italic; font-size: 17px; }
  .footer-note { text-align: center; font-size: 12px; color: #a89d8d; margin-top: 28px; }
  .long-press-hint { text-align: center; font-size: 12px; color: #bbb1a3; margin-top: 10px; }
  .hidden { display: none !important; }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(46,42,38,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  .modal { background: var(--paper); border-radius: 14px; padding: 24px; width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-family: 'Fraunces', serif; font-style: italic; margin: 0; font-size: 22px; }
  .modal-section { display: flex; flex-direction: column; gap: 6px; }
  .modal-section label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sage); }
  .modal input[type="text"], .modal input[type="date"], .modal select { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-family: 'Karla', sans-serif; font-size: 15px; outline: none; background: white; color: var(--ink); width: 100%; }
  .modal input:focus, .modal select:focus { border-color: var(--sage); }
  .modal-btn-row { display: flex; gap: 8px; }
  .modal button.primary { border: none; background: var(--clay); color: white; border-radius: 8px; padding: 11px; font-family: 'Karla', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; flex: 1; }
  .modal button.secondary { border: 1px solid var(--line); background: white; color: var(--ink); border-radius: 8px; padding: 11px; cursor: pointer; font-family: 'Karla', sans-serif; flex: 1; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: white; border: 1px solid var(--line); border-radius: 20px; padding: 4px 10px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .chip button { border: none; background: none; color: #bbb1a3; cursor: pointer; font-size: 14px; line-height: 1; }
  .chip button:hover { color: var(--clay); }
  .add-row { display: flex; gap: 6px; }
  .add-row input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-family: 'Karla', sans-serif; font-size: 14px; outline: none; background: white; }
  .add-row button { border: none; background: var(--sage); color: white; border-radius: 8px; padding: 0 14px; cursor: pointer; font-weight: 700; font-size: 18px; }
  .push-status { font-size: 12px; color: #7a7268; }
</style>
</head>
<body>
<div class="sheet">
  <header>
    <div class="eyebrow">Gemeinsam organisiert</div>
    <div class="title-row">
      <img src="apple-touch-icon.png" class="header-logo" alt="Logo">
      <h1>Bauer sucht<br>Aufgabe</h1>
    </div>
  </header>

  <!-- Login -->
  <div id="loginView" class="login-box">
    <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
    <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
    <div class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <label for="rememberMe">Angemeldet bleiben</label>
    </div>
    <button id="loginBtn">Anmelden</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- App -->
  <div id="appView" class="hidden">
    <div class="topbar">
      <button class="icon-btn" id="settingsBtn">⚙ Einstellungen</button>
      <button class="icon-btn" id="signoutBtn">Abmelden</button>
    </div>

    <div class="composer">
      <input id="textInput" type="text" placeholder="Was steht an?" maxlength="200">
      <div class="field-row">
        <div class="field-group">
          <span class="field-label">Kategorie</span>
          <select id="categoryInput"></select>
        </div>
        <div class="field-group">
          <span class="field-label">Für</span>
          <select id="assigneeInput"></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <span class="field-label">Priorität</span>
          <select id="priorityInput">
            <option value="">Keine</option>
            <option value="1">🔴 Prio 1</option>
            <option value="2">🟡 Prio 2</option>
            <option value="3">🟢 Prio 3</option>
          </select>
        </div>
        <div class="field-group">
          <span class="field-label">Fällig am</span>
          <input id="dueInput" type="date">
        </div>
      </div>
      <button class="add" id="addBtn">Hinzufügen</button>
    </div>

    <div class="list" id="list"></div>
    <div class="long-press-hint">Lang drücken zum Bearbeiten</div>
    <div class="push-status" id="pushStatus"></div>
  </div>

  <div class="footer-note">Nur ihr beide habt Zugriff – geschützt über Firebase-Login.</div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Einstellungen</h2>
    <div class="modal-section">
      <label>Kategorien</label>
      <div class="chip-row" id="categoryChips"></div>
      <div class="add-row">
        <input id="newCategoryInput" type="text" placeholder="Neue Kategorie" maxlength="30">
        <button id="addCategoryBtn">+</button>
      </div>
    </div>
    <div class="modal-section">
      <label>Zuweisungen</label>
      <div class="chip-row" id="assigneeChips"></div>
      <div class="add-row">
        <input id="newAssigneeInput" type="text" placeholder="Neuer Name" maxlength="30">
        <button id="addAssigneeBtn">+</button>
      </div>
    </div>
    <div class="modal-section">
      <label>Erinnerungen</label>
      <button class="secondary" id="enablePushBtn">Push-Benachrichtigungen aktivieren</button>
      <div class="push-status" id="pushStatusModal"></div>
    </div>
    <button class="primary" id="closeSettingsBtn">Fertig</button>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal">
    <h2>Bearbeiten</h2>
    <div class="modal-section">
      <label>Aufgabe</label>
      <input id="editTextInput" type="text" maxlength="200">
    </div>
    <div class="modal-section">
      <label>Kategorie</label>
      <select id="editCategoryInput"></select>
    </div>
    <div class="modal-section">
      <label>Für</label>
      <select id="editAssigneeInput"></select>
    </div>
    <div class="modal-section">
      <label>Priorität</label>
      <select id="editPriorityInput">
        <option value="">Keine</option>
        <option value="1">🔴 Prio 1</option>
        <option value="2">🟡 Prio 2</option>
        <option value="3">🟢 Prio 3</option>
      </select>
    </div>
    <div class="modal-section">
      <label>Fällig am</label>
      <input id="editDueInput" type="date">
    </div>
    <div class="modal-btn-row">
      <button class="secondary" id="cancelEditBtn">Abbrechen</button>
      <button class="primary" id="saveEditBtn">Speichern</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDfTQHSnhdX5-Z-3MCeDPpDeKXcuEbV1zE",
    authDomain: "todoliste-badfd.firebaseapp.com",
    projectId: "todoliste-badfd",
    storageBucket: "todoliste-badfd.firebasestorage.app",
    messagingSenderId: "764723309146",
    appId: "1:764723309146:web:75a7f9c88264a967c30663"
  };
  const VAPID_KEY = "BNpmdm1YDApJwKObfKF7s8HXIEen4jLAoK0oh7vOUjX-kZl7CKfOvG5net-cGWwDYFVbwkaLcBIhAeXfmvs6_9A";

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const todosRef = db.collection('todos');
  const configRef = db.collection('config');
  const tokensRef = db.collection('tokens');

  const DEFAULT_CATEGORIES = ['Freizeit', 'Einkauf', 'Haushalt', 'Sonstiges'];
  const DEFAULT_ASSIGNEES = ['Partner A', 'Partner B', 'Beide'];

  const loginView = document.getElementById('loginView');
  const appView = document.getElementById('appView');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const rememberMe = document.getElementById('rememberMe');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const signoutBtn = document.getElementById('signoutBtn');
  const textInput = document.getElementById('textInput');
  const categoryInput = document.getElementById('categoryInput');
  const assigneeInput = document.getElementById('assigneeInput');
  const priorityInput = document.getElementById('priorityInput');
  const dueInput = document.getElementById('dueInput');
  const addBtn = document.getElementById('addBtn');
  const listEl = document.getElementById('list');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsModal = document.getElementById('settingsModal');
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  const categoryChips = document.getElementById('categoryChips');
  const assigneeChips = document.getElementById('assigneeChips');
  const newCategoryInput = document.getElementById('newCategoryInput');
  const newAssigneeInput = document.getElementById('newAssigneeInput');
  const addCategoryBtn = document.getElementById('addCategoryBtn');
  const addAssigneeBtn = document.getElementById('addAssigneeBtn');
  const enablePushBtn = document.getElementById('enablePushBtn');
  const pushStatus = document.getElementById('pushStatus');
  const pushStatusModal = document.getElementById('pushStatusModal');
  const editModal = document.getElementById('editModal');
  const editTextInput = document.getElementById('editTextInput');
  const editCategoryInput = document.getElementById('editCategoryInput');
  const editAssigneeInput = document.getElementById('editAssigneeInput');
  const editPriorityInput = document.getElementById('editPriorityInput');
  const editDueInput = document.getElementById('editDueInput');
  const cancelEditBtn = document.getElementById('cancelEditBtn');
  const saveEditBtn = document.getElementById('saveEditBtn');

  let unsubTodos = null, unsubCategories = null, unsubAssignees = null;
  let categories = [], assignees = [], currentTodos = [], editingTodoId = null;

  // ---- Auth ----
  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    loginError.textContent = '';
    loginBtn.disabled = true;
    try {
      const p = rememberMe.checked ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
      await auth.setPersistence(p);
      await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
    } catch (e) {
      loginError.textContent = 'Anmeldung fehlgeschlagen. E-Mail oder Passwort prüfen.';
    }
    loginBtn.disabled = false;
  }

  signoutBtn.addEventListener('click', () => auth.signOut());

  auth.onAuthStateChanged(user => {
    if (user) {
      loginView.classList.add('hidden');
      appView.classList.remove('hidden');
      ensureDefaults().then(() => {
        subscribeToCategories();
        subscribeToAssignees();
        subscribeToTodos();
      });
    } else {
      loginView.classList.remove('hidden');
      appView.classList.add('hidden');
      if (unsubTodos) { unsubTodos(); unsubTodos = null; }
      if (unsubCategories) { unsubCategories(); unsubCategories = null; }
      if (unsubAssignees) { unsubAssignees(); unsubAssignees = null; }
    }
  });

  async function ensureDefaults() {
    const catDoc = await configRef.doc('categories').get();
    if (!catDoc.exists) await configRef.doc('categories').set({ items: DEFAULT_CATEGORIES });
    const asgDoc = await configRef.doc('assignees').get();
    if (!asgDoc.exists) await configRef.doc('assignees').set({ items: DEFAULT_ASSIGNEES });
  }

  function subscribeToCategories() {
    unsubCategories = configRef.doc('categories').onSnapshot(doc => {
      categories = (doc.exists && doc.data().items) || [];
      renderSelect(categoryInput, categories);
      renderSelect(editCategoryInput, categories);
      renderChips(categoryChips, categories, removeCategory);
    });
  }
  function subscribeToAssignees() {
    unsubAssignees = configRef.doc('assignees').onSnapshot(doc => {
      assignees = (doc.exists && doc.data().items) || [];
      renderSelect(assigneeInput, assignees);
      renderSelect(editAssigneeInput, assignees);
      renderChips(assigneeChips, assignees, removeAssignee);
    });
  }

  function renderSelect(el, items, selected) {
    const current = selected !== undefined ? selected : el.value;
    el.innerHTML = '';
    items.forEach(item => {
      const opt = document.createElement('option');
      opt.value = item; opt.textContent = item;
      el.appendChild(opt);
    });
    if (current && items.includes(current)) el.value = current;
  }

  function renderChips(container, items, onRemove) {
    container.innerHTML = '';
    items.forEach(item => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      const span = document.createElement('span');
      span.textContent = item;
      const btn = document.createElement('button');
      btn.innerHTML = '&times;';
      btn.onclick = () => onRemove(item);
      chip.appendChild(span); chip.appendChild(btn);
      container.appendChild(chip);
    });
  }

  addCategoryBtn.addEventListener('click', async () => {
    const val = newCategoryInput.value.trim();
    if (!val || categories.includes(val)) return;
    newCategoryInput.value = '';
    await configRef.doc('categories').set({ items: [...categories, val] });
  });
  addAssigneeBtn.addEventListener('click', async () => {
    const val = newAssigneeInput.value.trim();
    if (!val || assignees.includes(val)) return;
    newAssigneeInput.value = '';
    await configRef.doc('assignees').set({ items: [...assignees, val] });
  });
  async function removeCategory(val) { await configRef.doc('categories').set({ items: categories.filter(c => c !== val) }); }
  async function removeAssignee(val) { await configRef.doc('assignees').set({ items: assignees.filter(a => a !== val) }); }

  settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
  closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

  // ---- Todos ----
  function subscribeToTodos() {
    if (unsubTodos) unsubTodos();
    unsubTodos = todosRef.onSnapshot(snapshot => {
      const todos = [];
      const now = Date.now();
      const oneDayMs = 24 * 60 * 60 * 1000;
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.done && data.completedAt) {
          const ms = data.completedAt.toMillis ? data.completedAt.toMillis() : 0;
          if (now - ms > oneDayMs) { todosRef.doc(doc.id).delete().catch(() => {}); return; }
        }
        todos.push({ id: doc.id, ...data });
      });
      currentTodos = todos;
      render(todos);
    });
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function render(todos) {
    listEl.innerHTML = '';
    if (todos.length === 0) {
      listEl.innerHTML = '<div class="empty">Noch nichts auf der Liste —<br>fügt euren ersten Punkt hinzu.</div>';
      return;
    }
    const today = new Date(); today.setHours(0,0,0,0);

    const sorted = [...todos].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      const aPrio = a.priority ? parseInt(a.priority) : 99;
      const bPrio = b.priority ? parseInt(b.priority) : 99;
      if (aPrio !== bPrio) return aPrio - bPrio;
      const aDue = a.dueDate ? new Date(a.dueDate) : null;
      const bDue = b.dueDate ? new Date(b.dueDate) : null;
      if (aDue && bDue) return aDue - bDue;
      if (aDue && !bDue) return -1;
      if (!aDue && bDue) return 1;
      return (a.createdAt ? a.createdAt.toMillis() : 0) - (b.createdAt ? b.createdAt.toMillis() : 0);
    });

    for (const todo of sorted) {
      const dueDate = todo.dueDate ? new Date(todo.dueDate + 'T00:00:00') : null;
      const isOverdue = dueDate && !todo.done && dueDate < today;

      const item = document.createElement('div');
      let cls = 'item';
      if (todo.priority) cls += ' prio-' + todo.priority;
      if (todo.done) cls += ' done';
      if (isOverdue) cls += ' overdue';
      item.className = cls;
      addLongPress(item, todo.id);

      const checkbox = document.createElement('div');
      checkbox.className = 'checkbox' + (todo.done ? ' checked' : '');
      checkbox.onclick = e => { e.stopPropagation(); toggleTodo(todo.id, !todo.done); };

      const body = document.createElement('div');
      body.className = 'item-body';

      const textDiv = document.createElement('div');
      textDiv.className = 'item-text';
      textDiv.textContent = todo.text;

      const meta = document.createElement('div');
      meta.className = 'meta';

      if (todo.priority) {
        const labels = { '1': '🔴 Prio 1', '2': '🟡 Prio 2', '3': '🟢 Prio 3' };
        const prioEl = document.createElement('span');
        prioEl.className = 'prio-label';
        prioEl.textContent = labels[todo.priority] || '';
        meta.appendChild(prioEl);
      }
      if (todo.category) {
        const el = document.createElement('span');
        el.className = 'tag category';
        el.textContent = todo.category;
        meta.appendChild(el);
      }
      if (todo.assignee) {
        const el = document.createElement('span');
        el.className = 'tag assignee';
        el.textContent = todo.assignee;
        meta.appendChild(el);
      }
      if (todo.dueDate) {
        const el = document.createElement('div');
        el.className = 'date-badge' + (isOverdue ? ' overdue' : '');
        el.innerHTML = '<span class="date-badge-icon">📅</span>' + formatDate(todo.dueDate);
        meta.appendChild(el);
      }

      body.appendChild(textDiv);
      body.appendChild(meta);

      const delBtn = document.createElement('button');
      delBtn.className = 'del';
      delBtn.innerHTML = '&times;';
      delBtn.onclick = e => { e.stopPropagation(); deleteTodo(todo.id); };

      item.appendChild(checkbox);
      item.appendChild(body);
      item.appendChild(delBtn);
      listEl.appendChild(item);
    }
  }

  // ---- Long press ----
  let longPressTimer = null;
  function addLongPress(el, todoId) {
    const start = () => { longPressTimer = setTimeout(() => { el.classList.add('pressing'); openEditModal(todoId); el.classList.remove('pressing'); }, 600); };
    const cancel = () => { clearTimeout(longPressTimer); el.classList.remove('pressing'); };
    el.addEventListener('touchstart', start, { passive: true });
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchmove', cancel);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
  }

  function openEditModal(todoId) {
    const todo = currentTodos.find(t => t.id === todoId);
    if (!todo) return;
    editingTodoId = todoId;
    editTextInput.value = todo.text;
    editDueInput.value = todo.dueDate || '';
    editPriorityInput.value = todo.priority || '';
    renderSelect(editCategoryInput, categories, todo.category);
    renderSelect(editAssigneeInput, assignees, todo.assignee);
    editModal.classList.remove('hidden');
  }

  cancelEditBtn.addEventListener('click', () => { editModal.classList.add('hidden'); editingTodoId = null; });
  saveEditBtn.addEventListener('click', async () => {
    const text = editTextInput.value.trim();
    if (!text || !editingTodoId) return;
    try {
      await todosRef.doc(editingTodoId).update({
        text,
        category: editCategoryInput.value || null,
        assignee: editAssigneeInput.value || null,
        dueDate: editDueInput.value || null,
        priority: editPriorityInput.value || null,
        notified: false
      });
      editModal.classList.add('hidden');
      editingTodoId = null;
    } catch (e) { console.error(e); }
  });

  // ---- Add / Toggle / Delete ----
  addBtn.addEventListener('click', addTodo);
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  async function addTodo() {
    const text = textInput.value.trim();
    if (!text || !auth.currentUser) return;
    const payload = {
      text, done: false,
      category: categoryInput.value || null,
      assignee: assigneeInput.value || null,
      dueDate: dueInput.value || null,
      priority: priorityInput.value || null,
      notified: false, completedAt: null,
      authorEmail: auth.currentUser.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    textInput.value = ''; dueInput.value = ''; priorityInput.value = '';
    try { await todosRef.add(payload); } catch (e) { console.error(e); }
  }

  async function toggleTodo(id, done) {
    const update = { done, completedAt: done ? firebase.firestore.FieldValue.serverTimestamp() : null };
    try { await todosRef.doc(id).update(update); } catch (e) { console.error(e); }
  }

  async function deleteTodo(id) {
    try { await todosRef.doc(id).delete(); } catch (e) { console.error(e); }
  }

  // ---- Push ----
  let messaging;
  try { messaging = firebase.messaging(); } catch (e) { messaging = null; }
  function setPushStatus(t) { pushStatus.textContent = t; pushStatusModal.textContent = t; }
  async function registerPush() {
    if (!messaging) { setPushStatus('Push nicht unterstützt.'); return; }
    try {
      const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { setPushStatus('Benachrichtigungen nicht erlaubt.'); return; }
      const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
      if (token) {
        await tokensRef.doc(token).set({ token, email: auth.currentUser?.email || null, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        setPushStatus('Push-Benachrichtigungen aktiv ✓');
      } else {
        setPushStatus('Seite zum Home-Bildschirm hinzufügen und erneut versuchen.');
      }
    } catch (e) { setPushStatus('Fehler: ' + e.message); }
  }
  enablePushBtn.addEventListener('click', registerPush);
  if (messaging) messaging.onMessage(() => {});
</script>
</body>
</html>
