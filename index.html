<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bauer sucht Aufgabe</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bauer sucht Aufgabe">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap');

:root {
  --paper: #F7F3ED; --ink: #2E2A26; --line: #DDD4C7;
  --sage: #6B7C63; --clay: #B5654A; --gold: #C9A24B; --red: #B23A2E;
  --card: #ffffff; --sub: #7a7268; --input-bg: #F7F3ED;
  --shadow: 0 2px 0 #DDD4C7;
}
body.dark {
  --paper: #161412; --ink: #EDE8E0; --line: #38322C;
  --card: #231F1B; --sub: #8A8078; --input-bg: #1C1814;
  --shadow: 0 2px 0 #38322C;
  --sage: #7E9474; --clay: #C97560; --gold: #D4AD58; --red: #C94A3C;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; background:var(--paper); color:var(--ink); font-family:'Karla',sans-serif; min-height:100vh; display:flex; justify-content:center; padding:74px 14px 80px; transition:background .25s,color .25s; }
.sheet { width:100%; max-width:560px; }

/* Header */
header { text-align:center; margin-bottom:20px; }
.title-row { display:flex; align-items:center; justify-content:center; gap:14px; }
.header-logo { width:52px; height:52px; border-radius:13px; flex-shrink:0; box-shadow:0 3px 10px rgba(0,0,0,0.15); }
h1 { font-family:'Fraunces',serif; font-weight:600; font-size:32px; margin:0; font-style:italic; line-height:1.15; text-align:left; }

/* Stats bar */
.stats-bar { display:flex; justify-content:center; gap:20px; margin:10px 0 18px; font-size:13px; color:var(--sub); }
.stat-chip { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:4px 14px; font-weight:700; box-shadow:var(--shadow); transition:border-color .15s,background .15s; }
.stat-chip:hover { border-color:var(--sage); background:rgba(107,124,99,0.08); }
.stat-chip span { color:var(--sage); }

/* Topbar */




/* Login */
.login-box { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px 24px; box-shadow:var(--shadow); }
.login-box form { display:flex; flex-direction:column; gap:12px; }
.login-box input { border:1px solid var(--line); border-radius:8px; padding:11px 12px; font-family:'Karla',sans-serif; font-size:15px; outline:none; background:var(--input-bg); color:var(--ink); width:100%; }
.login-box input:focus { border-color:var(--sage); }
.remember-row { display:flex; align-items:center; gap:8px; font-size:14px; color:var(--sub); }
.remember-row input[type="checkbox"] { width:16px; height:16px; accent-color:var(--sage); }
.login-box button[type="submit"] { border:none; background:var(--clay); color:white; border-radius:8px; padding:11px; font-family:'Karla',sans-serif; font-weight:700; font-size:15px; cursor:pointer; }
.login-error { color:var(--red); font-size:13px; text-align:center; min-height:16px; }

/* Composer */
.composer { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:var(--shadow); margin-bottom:14px; display:flex; flex-direction:column; gap:8px; }
.composer input[type="text"], .composer textarea { border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-family:'Karla',sans-serif; font-size:15px; outline:none; background:var(--input-bg); color:var(--ink); width:100%; resize:none; }
.composer input[type="text"]:focus, .composer textarea:focus { border-color:var(--sage); }
.field-row { display:flex; gap:8px; }
.field-group { display:flex; flex-direction:column; gap:3px; flex:1; }
.field-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--sage); padding-left:2px; }
.field-group select, .field-group input[type="date"] { border:1px solid var(--line); border-radius:8px; padding:8px 8px; font-family:'Karla',sans-serif; font-size:13px; outline:none; background:var(--input-bg); color:var(--ink); width:100%; height:38px; box-sizing:border-box; }
.field-group select { -webkit-appearance:none; appearance:none; }
.field-group input[type="date"] { -webkit-appearance:none; appearance:none; }
.date-field-wrap { position:relative; }
.date-field-wrap .date-placeholder {
  position:absolute; left:9px; top:0; height:38px; align-items:center;
  font-family:'Karla',sans-serif; font-size:13px; color:var(--sub); pointer-events:none;
  display:none;
}
.date-field-wrap.is-empty .date-placeholder { display:flex; }
.date-field-wrap input[type="date"]::-webkit-datetime-edit,
.date-field-wrap input[type="date"]::-webkit-datetime-edit-fields-wrapper {
  color:var(--ink);
}
.date-field-wrap.is-empty input[type="date"] { color:transparent; }
.date-field-wrap.is-empty input[type="date"]::-webkit-datetime-edit { opacity:0; }
.field-group select:focus, .field-group input[type="date"]:focus { border-color:var(--sage); }
.more-opts-btn { border:none; background:none; color:var(--sage); font-size:13px; font-weight:700; cursor:pointer; font-family:'Karla',sans-serif; text-align:left; padding:2px 0; }
.extra-opts { display:flex; flex-direction:column; gap:8px; }
.photo-preview { width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
.photo-add-btn { border:1px dashed var(--line); background:var(--input-bg); color:var(--sub); border-radius:8px; padding:8px; font-family:'Karla',sans-serif; font-size:13px; cursor:pointer; text-align:center; height:38px; box-sizing:border-box; display:flex; align-items:center; justify-content:center; width:100%; }
.composer button.add { border:none; background:var(--clay); color:white; border-radius:8px; padding:11px; font-family:'Karla',sans-serif; font-weight:700; font-size:15px; cursor:pointer; width:100%; }

/* Search */
.app-header { position:fixed; top:0; left:0; right:0; z-index:9; display:flex; align-items:center; justify-content:space-between; padding:12px 12px; background:var(--paper); border-bottom:1px solid var(--line); }
.header-side { display:flex; align-items:center; }
.header-side.left { flex:1; justify-content:flex-start; overflow:hidden; }
.header-side.right { flex:1; justify-content:flex-end; }
.header-center { display:flex; align-items:center; gap:8px; flex-shrink:0; padding:0 8px; transition:opacity .2s ease, visibility .2s ease; }
.header-center img { width:28px; height:28px; border-radius:7px; flex-shrink:0; }
.header-center span { font-family:'Fraunces',serif; font-style:italic; font-weight:600; font-size:16px; white-space:nowrap; }
.app-header.search-open .header-center { opacity:0; visibility:hidden; pointer-events:none; flex:0 0 0 !important; width:0 !important; padding:0 !important; overflow:hidden !important; margin:0 !important; }
.header-icon-btn { background:transparent; border:none; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--ink); border-radius:50%; transition:background .15s,color .15s,opacity .15s; flex-shrink:0; padding:0; }
.header-icon-btn:hover { opacity:0.65; }
.header-icon-btn.active { background:var(--sage); color:white; }
.search-expand { width:0; max-width:0; overflow:hidden; opacity:0; transition:max-width .3s ease, opacity .25s ease; flex:0 0 0; }
.search-expand.open { max-width:1000px; width:auto; opacity:1; margin-left:8px; flex:1 1 auto; }
.search-input { width:100%; border:1px solid var(--line); border-radius:22px; padding:8px 14px; font-family:'Karla',sans-serif; font-size:14px; outline:none; background:var(--card); color:var(--ink); box-sizing:border-box; display:block; }
.search-input:focus { border-color:var(--sage); }

/* List */
.list { display:flex; flex-direction:column; gap:10px; }

.item { position:relative; border-radius:12px; border:1px solid var(--line); overflow:hidden; background:var(--card); animation:rise .25s ease; }

/* Long-Press Feedback */
.item::after {
  content:'';
  position:absolute; left:0; bottom:0; height:4px; width:0%;
  background:var(--sage); border-radius:0 3px 3px 0;
  pointer-events:none; opacity:0;
}
.item.long-pressing {
  transform:scale(0.97);
  box-shadow:0 0 0 2px var(--sage);
  transition:transform .08s ease, box-shadow .08s ease;
}
.item.long-pressing::after {
  opacity:1; width:100%;
  transition:width .6s linear, opacity .1s ease;
}
.item.long-pressed {
  animation:longPressPop .35s ease;
}
@keyframes longPressPop {
  0%   { transform:scale(0.97); box-shadow:0 0 0 2px var(--sage); }
  50%  { transform:scale(1.02); box-shadow:0 0 0 4px var(--sage); background-color:var(--input-bg); }
  100% { transform:scale(1); box-shadow:0 0 0 0 rgba(0,0,0,0); }
}
@keyframes rise { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.item.prio-1 { background:#FDE8E5; border-color:#D4776B; }
.item.prio-2 { background:#FEF8E6; border-color:#C9A24B; }
.item.prio-3 { background:#EAF2E6; border-color:#7EAD72; }
body.dark .item { background:var(--card); }
body.dark .item.prio-1 { background:#3D1A17; border-color:#8B4036; }
body.dark .item.prio-2 { background:#2D2510; border-color:#8B6E20; }
body.dark .item.prio-3 { background:#162318; border-color:#3E7035; }
.item.done { opacity:.45; }
.item.overdue { border-color:var(--red) !important; }
.item.deleted { opacity:.5; }
.restore-btn { border:1px solid var(--line); background:var(--card); color:var(--sage); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }

.item-content { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; background:inherit; position:relative; z-index:1; transition:transform .1s ease; user-select:none; -webkit-user-select:none; }
.checkbox { width:22px; height:22px; border-radius:50%; border:2px solid var(--sage); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-top:2px; background:var(--card); transition:background .15s; }
.item.prio-1 .checkbox, .item.prio-2 .checkbox, .item.prio-3 .checkbox { background:transparent; }
.checkbox.checked { background:var(--sage); border-color:var(--sage); }
.checkbox.checked::after { content:'✓'; color:white; font-size:13px; font-weight:bold; }

.item-body { flex:1; min-width:0; }
.item-text { font-size:15px; line-height:1.4; word-break:break-word; }
.item.done .item-text { text-decoration:line-through; }
.item-notes { font-size:13px; color:var(--sub); margin-top:4px; line-height:1.4; word-break:break-word; }
.item-photo { width:56px; height:56px; object-fit:cover; border-radius:8px; margin-top:8px; border:1px solid var(--line); display:block; }
.meta { display:flex; gap:6px; align-items:center; margin-top:6px; flex-wrap:wrap; }
.tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
.tag.category { background:rgba(107,124,99,0.18); color:var(--sage); }
.tag.assignee { background:rgba(181,101,74,0.18); color:var(--clay); }
.tag.recurring { background:rgba(46,42,38,0.09); color:var(--ink); }
.date-badge { display:flex; align-items:center; gap:3px; font-size:12px; font-weight:700; background:rgba(201,162,75,0.18); color:#8a6c1a; border-radius:8px; padding:3px 10px; }
body.dark .date-badge { color:var(--gold); }
.date-badge.overdue { background:rgba(178,58,46,0.15); color:var(--red); animation:overduepulse 1.8s ease-in-out infinite; }
@keyframes overduepulse {
  0%,100% { opacity:1; }
  50% { opacity:0.35; }
}
.prio-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; opacity:.65; }
.del { border:none; background:transparent; color:#bbb1a3; font-size:18px; cursor:pointer; line-height:1; padding:2px 4px; flex-shrink:0; }
.del:hover { color:var(--clay); }

.empty { text-align:center; padding:48px 20px; color:var(--sub); font-family:'Fraunces',serif; font-style:italic; font-size:17px; }
/* detail modal */
.detail-photo { width:100%; max-height:220px; object-fit:cover; border-radius:10px; border:1px solid var(--line); cursor:zoom-in; display:block; }
.detail-value { font-size:15px; color:var(--ink); word-break:break-word; }
/* fullscreen image viewer */
#imgViewer { position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; touch-action:none; }
#imgViewer img { max-width:100%; max-height:100%; object-fit:contain; transform-origin:center center; user-select:none; -webkit-user-select:none; will-change:transform; }
#imgViewerClose { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.18); border:none; color:#fff; font-size:24px; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:1; line-height:1; }

/* Trenner + aufklappbarer Erledigt-Bereich */
.done-divider { display:flex; align-items:center; gap:10px; margin:16px 0 8px; cursor:pointer; user-select:none; -webkit-user-select:none; }
.done-divider-line { flex:1; height:1px; background:var(--line); }
.done-divider-label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--sub); white-space:nowrap; display:flex; align-items:center; gap:6px; }
.done-divider-arrow { font-size:10px; transition:transform .25s ease; display:inline-block; }
.done-divider-arrow.open { transform:rotate(180deg); }
.done-section { overflow:hidden; max-height:0; transition:max-height .35s ease; display:flex; flex-direction:column; gap:10px; }
.done-section.open { max-height:9999px; }
.hidden { display:none !important; }

/* Modals */
.modal-overlay { position:fixed; inset:0; background:rgba(46,42,38,0.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:10; overflow:hidden; }
.modal { background:var(--paper); border-radius:14px; padding:22px; width:100%; max-width:420px; max-height:88vh; overflow-y:auto; display:flex; flex-direction:column; gap:14px; overscroll-behavior:contain; }
body.modal-open { overflow:hidden; touch-action:none; }
.modal h2 { font-family:'Fraunces',serif; font-style:italic; margin:0; font-size:22px; }
.modal-section { display:flex; flex-direction:column; gap:6px; }
.modal-section label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--sage); }
.modal input[type="text"], .modal input[type="date"], .modal select, .modal textarea { border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-family:'Karla',sans-serif; font-size:15px; outline:none; background:var(--card); color:var(--ink); width:100%; resize:none; }
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color:var(--sage); }
.modal-btn-row { display:flex; gap:8px; }
.modal button.primary { border:none; background:var(--clay); color:white; border-radius:8px; padding:11px; font-family:'Karla',sans-serif; font-weight:700; font-size:15px; cursor:pointer; flex:1; }
.modal button.secondary { border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:8px; padding:11px; cursor:pointer; font-family:'Karla',sans-serif; flex:1; }
.modal button.secondary.push-active { border-color:#4a7c59; background:#eef5f0; color:#4a7c59; font-weight:700; }
.modal button.danger { border:none; background:#FDE8E5; color:var(--red); border-radius:8px; padding:11px; cursor:pointer; font-family:'Karla',sans-serif; font-weight:700; flex:1; }
.chip-row { display:flex; flex-wrap:wrap; gap:6px; }
.chip { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:4px 10px; font-size:13px; display:flex; align-items:center; gap:6px; }
.chip button { border:none; background:none; color:#bbb1a3; cursor:pointer; font-size:14px; line-height:1; }
.add-row { display:flex; gap:6px; }
.add-row input { flex:1; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-family:'Karla',sans-serif; font-size:14px; outline:none; background:var(--card); color:var(--ink); }
.add-row button { border:none; background:var(--sage); color:white; border-radius:8px; padding:0 14px; cursor:pointer; font-weight:700; font-size:18px; }
.push-status { font-size:12px; color:var(--sub); }
.report-row { display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
.report-row:last-child { border-bottom:none; }
.report-row .r-text { flex:1; min-width:0; }
.report-row .r-who { color:var(--sage); font-weight:700; white-space:nowrap; text-align:right; }
.report-row .r-date { color:var(--sub); font-size:11px; }
.report-empty { text-align:center; color:var(--sub); font-family:'Fraunces',serif; font-style:italic; padding:20px; }
.modal-photo-preview { width:100%; max-height:180px; object-fit:cover; border-radius:10px; border:1px solid var(--line); }
</style>
</head>
<body>
<div class="sheet">
  <!-- App Header -->
  <div class="app-header">
    <div class="header-side left">
      <button class="header-icon-btn" id="searchToggleBtn">🔍</button>
      <div class="search-expand" id="searchBar">
        <input type="search" id="searchInput" class="search-input" placeholder="Suchen...">
      </div>
    </div>
    <div class="header-center">
      <img src="apple-touch-icon.png" alt="">
      <span>Bauer sucht Aufgabe</span>
    </div>
    <div class="header-side right">
      <button class="header-icon-btn" id="settingsBtn">☰</button>
    </div>
  </div>

  <!-- Login -->
  <div id="loginView" class="login-box">
    <form onsubmit="return false">
      <div style="display:flex;flex-direction:column;gap:12px">
        <input id="emailInput" type="email" placeholder="E-Mail" autocomplete="username">
        <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
        <div class="remember-row">
          <input type="checkbox" id="rememberMe" checked>
          <label for="rememberMe">Angemeldet bleiben</label>
        </div>
        <button type="submit" id="loginBtn">Anmelden</button>
        <div class="login-error" id="loginError"></div>
      </div>
    </form>
  </div>

  <!-- App -->
  <div id="appView" class="hidden">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Composer -->
    <div class="composer">
      <input id="textInput" type="text" placeholder="Was steht an?" maxlength="200">
      <div class="field-row">
        <div class="field-group">
          <span class="field-label">Kategorie</span>
          <select id="categoryInput"></select>
        </div>
        <div class="field-group">
          <span class="field-label">Für</span>
          <select id="assigneeInput"></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <span class="field-label">Priorität</span>
          <select id="priorityInput">
            <option value="">Keine</option>
            <option value="1">🔴 Prio 1</option>
            <option value="2">🟡 Prio 2</option>
            <option value="3">🟢 Prio 3</option>
          </select>
        </div>
        <div class="field-group">
          <span class="field-label">Fällig am</span>
          <div class="date-field-wrap is-empty" id="dueInputWrap">
            <input id="dueInput" type="date">
            <span class="date-placeholder">Datum wählen</span>
          </div>
        </div>
      </div>
      <button class="more-opts-btn" id="moreOptsBtn">⊕ Weitere Optionen</button>
      <div class="extra-opts hidden" id="extraOpts">
        <div class="field-row">
          <div class="field-group">
            <span class="field-label">Wiederholen</span>
            <select id="recurringInput">
              <option value="">Nie</option>
              <option value="daily">Täglich</option>
              <option value="weekly">Wöchentlich</option>
              <option value="monthly">Monatlich</option>
            </select>
          </div>
          <div class="field-group">
            <span class="field-label">Foto</span>
            <button type="button" class="photo-add-btn" id="photoAddBtn">📷 Foto wählen</button>
            <input type="file" id="photoInput" accept="image/*" class="hidden">
          </div>
        </div>
        <div class="field-group">
          <span class="field-label">Notiz</span>
          <textarea id="notesInput" placeholder="Zusätzliche Details..." rows="2"></textarea>
        </div>
        <img id="photoPreview" class="photo-preview hidden">
      </div>
      <button class="add" id="addBtn" type="button">Hinzufügen</button>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay hidden">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <h2 style="margin:0" id="detailTitle"></h2>
      <button class="secondary" id="detailEditBtn" style="flex:0 0 auto;padding:8px 16px;font-size:13px;">✏️ Bearbeiten</button>
    </div>
    <div class="modal-section" id="detailNotesSection">
      <label>Notiz</label>
      <div class="detail-value" id="detailNotes"></div>
    </div>
    <div class="modal-section" id="detailCategorySection">
      <label>Kategorie</label>
      <div class="detail-value" id="detailCategory"></div>
    </div>
    <div class="modal-section" id="detailAssigneeSection">
      <label>Für</label>
      <div class="detail-value" id="detailAssignee"></div>
    </div>
    <div class="modal-section" id="detailPrioritySection">
      <label>Priorität</label>
      <div class="detail-value" id="detailPriority"></div>
    </div>
    <div class="modal-section" id="detailDueSection">
      <label>Fällig am</label>

// ---- Photo resize ----
function resizeImage(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=300; let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
        const c=document.createElement('canvas');
        c.width=Math.round(w); c.height=Math.round(h);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.65));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ---- Stats ----
function getWeekKey(){
  const now=new Date();
  const d=new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate()));
  const dow=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dow);
  const y=d.getUTCFullYear();
  const wk=Math.ceil(((d-new Date(Date.UTC(y,0,1)))/86400000+1)/7);
  return y+'-W'+String(wk).padStart(2,'0');
}
function safeEmail(email){ return (email||'').replace(/[.@]/g,'_'); }

function getDisplayName(email){
  if(!email) return '—';
  return usernameMap[email] || email.split('@')[0];
}

  statsBar.innerHTML='';

  entries.forEach(([key,count])=>{
    const email=knownUsers[key]||key;
    const name=getDisplayName(email);
    const chip=document.createElement('div'); chip.className='stat-chip'; chip.style.cursor='pointer'; chip.title='Report anzeigen';
    chip.innerHTML=escapeHtml(name)+': <span>'+count+' ✓</span>';
    chip.onclick=()=>openReportForEmail(email, name);
    statsBar.appendChild(chip);
  });
}

async function recordCompletion(done,targetEmail){
  const email=targetEmail||(auth.currentUser&&auth.currentUser.email);
  if(!email) return;
  const week=getWeekKey(); const key=safeEmail(email);
  const ref=statsRef.doc(week);
  try{
    await db.runTransaction(async(tx)=>{
      const snap=await tx.get(ref);
      const data=snap.exists?snap.data():{};
      const current=data[key]||0;
      if(done){
        tx.set(ref,{[key]:current+1},{merge:true});
      } else if(current>0){
        // Zähler darf nicht negativ werden -> nur runterzählen wenn > 0
        tx.set(ref,{[key]:current-1},{merge:true});
      }
    });
  }catch(e){console.error(e);}
}

function subscribeToTodos(){

    const todos=[]; const now=Date.now(); const week=7*86400000;
    snap.forEach(doc=>{
      const d=doc.data();
      if(d.deleted&&d.deletedAt){
        const ms=d.deletedAt.toMillis?d.deletedAt.toMillis():0;
        if(now-ms>week){todosRef.doc(doc.id).delete().catch(()=>{});return;}
      } else if(d.done&&d.completedAt){
        const ms=d.completedAt.toMillis?d.completedAt.toMillis():0;
        if(now-ms>week){todosRef.doc(doc.id).delete().catch(()=>{});return;}
      }
      todos.push({id:doc.id,...d});
    });
    currentTodos=todos; render(todos);
    // Push-Notification Deep Link: ?editId=<todoId> – nur einmal beim ersten Laden
    if(!window._deepLinkHandled){
      window._deepLinkHandled=true;
      const urlParams=new URLSearchParams(window.location.search);
      const editId=urlParams.get('editId');
      if(editId){
        const target=todos.find(t=>t.id===editId);
        if(target){
          // Kurz warten damit das Modal-CSS bereit ist
          setTimeout(()=>{
            openEditModal(editId);
            window.history.replaceState({},'',window.location.pathname);
          }, 300);
        }
      }
    }
  });
}


function formatDate(s){
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
}
function recurringLabel(r){ return {daily:'täglich',weekly:'wöchentlich',monthly:'monatlich'}[r]||''; }
function nextDue(dateStr,recurring){
  const d=dateStr?new Date(dateStr+'T00:00:00'):new Date();
  if(recurring==='daily') d.setDate(d.getDate()+1);
  else if(recurring==='weekly') d.setDate(d.getDate()+7);
  else if(recurring==='monthly') d.setMonth(d.getMonth()+1);
  return d.toISOString().slice(0,10);
}

function render(todos){
  const filtered=applyFilters(todos);
  listEl.innerHTML='';
  if(filtered.length===0){
    listEl.innerHTML='<div class="empty">'+(todos.length===0?'Noch nichts auf der Liste.':'Keine Treffer für diesen Filter.')+'</div>';
    return;
  }
  const today=new Date(); today.setHours(0,0,0,0);
  const sorted=[...filtered].sort((a,b)=>{
    if(!!a.deleted!==!!b.deleted) return a.deleted?1:-1;
    if(a.done!==b.done) return a.done?1:-1;
    const ap=a.priority?parseInt(a.priority):99, bp=b.priority?parseInt(b.priority):99;
    if(ap!==bp) return ap-bp;
    const ad=a.dueDate?new Date(a.dueDate):null, bd=b.dueDate?new Date(b.dueDate):null;
    if(ad&&bd) return ad-bd; if(ad) return -1; if(bd) return 1;
    return (a.createdAt?a.createdAt.toMillis():0)-(b.createdAt?b.createdAt.toMillis():0);
  });

  // Aktive und erledigte/gelöschte trennen
  const activeTodos  = sorted.filter(t => !t.done && !t.deleted);
  const finishedTodos = sorted.filter(t => t.done || t.deleted);

  function buildItem(todo){
    const due=todo.dueDate?new Date(todo.dueDate+'T00:00:00'):null;
    const overdue=due&&!todo.done&&due<today;

    const wrapper=document.createElement('div');
    let cls='item';
    if(todo.priority) cls+=' prio-'+todo.priority;
    if(todo.done) cls+=' done';
    if(todo.deleted) cls+=' deleted';
    if(overdue) cls+=' overdue';
    wrapper.className=cls;

    const content=document.createElement('div');
    content.className='item-content';

    const cb=document.createElement('div');
    cb.className='checkbox'+(todo.done?' checked':'');
    cb.onclick=e=>{e.stopPropagation();if(!todo.deleted)toggleTodo(todo.id,!todo.done);};
    if(todo.deleted) cb.style.visibility='hidden';

    const body=document.createElement('div');
    body.className='item-body';

    const textDiv=document.createElement('div');
    textDiv.className='item-text'; textDiv.textContent=todo.text;
    body.appendChild(textDiv);

    if(todo.notes){
      const nd=document.createElement('div');
      nd.className='item-notes'; nd.textContent=todo.notes;
      body.appendChild(nd);
    }
    if(todo.photo){
      const img=document.createElement('img');
      img.className='item-photo'; img.src=todo.photo; img.alt=''; img.loading='lazy';
      body.appendChild(img);
    }

    const meta=document.createElement('div'); meta.className='meta';
    if(todo.priority){
      const pl=document.createElement('span'); pl.className='prio-label';
      pl.textContent={'1':'🔴 Prio 1','2':'🟡 Prio 2','3':'🟢 Prio 3'}[todo.priority]||'';
      meta.appendChild(pl);
    }
    if(todo.category){const t=document.createElement('span');t.className='tag category';t.textContent=todo.category;meta.appendChild(t);}
    if(todo.assignee){const t=document.createElement('span');t.className='tag assignee';t.textContent=todo.assignee;meta.appendChild(t);}
    if(todo.recurring){const t=document.createElement('span');t.className='tag recurring';t.textContent='↻ '+recurringLabel(todo.recurring);meta.appendChild(t);}
    if(todo.dueDate){
      const db2=document.createElement('div');
      db2.className='date-badge'+(overdue?' overdue':'');
      db2.textContent=formatDate(todo.dueDate);
      meta.appendChild(db2);
    }
    if(todo.deleted){
      const dtag=document.createElement('span'); dtag.className='tag'; dtag.style.background='rgba(178,58,46,0.15)'; dtag.style.color='var(--red)';
      dtag.textContent='Gelöscht'; meta.appendChild(dtag);
    }
    body.appendChild(meta);

    let actionBtn;
    if(todo.deleted){
      actionBtn=document.createElement('button');
      actionBtn.className='restore-btn'; actionBtn.textContent='Wiederherstellen';
      actionBtn.onclick=e=>{e.stopPropagation();restoreTodo(todo.id);};
    } else {
      actionBtn=document.createElement('button');
      actionBtn.className='del'; actionBtn.innerHTML='&times;';
      actionBtn.onclick=e=>{e.stopPropagation();deleteTodo(todo.id);};
    }

    content.appendChild(cb); content.appendChild(body); content.appendChild(actionBtn);
    wrapper.appendChild(content);
    if(!todo.deleted) addGestures(wrapper,content,todo.id);
    return wrapper;
  }

  // Aktive Einträge direkt rendern
  activeTodos.forEach(todo => listEl.appendChild(buildItem(todo)));

  // Erledigte/Gelöschte unter aufklappbarem Trenner
  if(finishedTodos.length > 0){
    const divider = document.createElement('div');
    divider.className = 'done-divider';
    const line1 = document.createElement('div'); line1.className='done-divider-line';
    const label = document.createElement('div'); label.className='done-divider-label';
    const arrow = document.createElement('span'); arrow.className='done-divider-arrow';
    arrow.textContent='▼';
    label.innerHTML='<span>Erledigt &amp; Gelöscht ('+finishedTodos.length+')</span>';
    label.appendChild(arrow);
    const line2 = document.createElement('div'); line2.className='done-divider-line';
    divider.appendChild(line1); divider.appendChild(label); divider.appendChild(line2);

    const section = document.createElement('div');
    section.className = 'done-section';
    // Standard: eingeklappt – nur aufklappen wenn sessionStorage es merkt
    if(sessionStorage.getItem('doneOpen')==='1'){ section.classList.add('open'); arrow.classList.add('open'); }

    divider.addEventListener('click',()=>{
      const open = section.classList.toggle('open');
      arrow.classList.toggle('open', open);
      sessionStorage.setItem('doneOpen', open?'1':'0');
    });

    finishedTodos.forEach(todo => section.appendChild(buildItem(todo)));
    listEl.appendChild(divider);
    listEl.appendChild(section);
  }
}

// ---- Fullscreen Image Viewer mit Pinch-Zoom ----
let _vScale=1, _vLastScale=1, _vX=0, _vY=0, _vLastX=0, _vLastY=0;
let _vPinching=false, _vDist0=0, _vMid={x:0,y:0};
let _vPointers=[];
let _vDblTimer=null;

function openImgViewer(src){
  imgViewerImg.src=src;
  _vScale=1; _vX=0; _vY=0;
  imgViewerImg.style.transform='';
  imgViewer.classList.remove('hidden');
  document.body.classList.add('modal-open');
}
function closeImgViewer(){
  imgViewer.classList.add('hidden');
  document.body.classList.remove('modal-open');
  imgViewerImg.src='';
}
function _vApply(){ imgViewerImg.style.transform=`translate(${_vX}px,${_vY}px) scale(${_vScale})`; }
function _vDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }

detailPhoto.addEventListener('click',()=>{ if(detailPhoto.src) openImgViewer(detailPhoto.src); });
imgViewerClose.addEventListener('click', closeImgViewer);
imgViewer.addEventListener('click', e=>{ if(e.target===imgViewer) closeImgViewer(); });

// Pointer events for pan + pinch
imgViewerImg.addEventListener('pointerdown', e=>{
  imgViewerImg.setPointerCapture(e.pointerId);
  _vPointers.push(e);
  if(_vPointers.length===2){
    _vPinching=true;
    _vDist0=_vDist(_vPointers[0],_vPointers[1]);
    _vLastScale=_vScale;
    _vMid={ x:(_vPointers[0].clientX+_vPointers[1].clientX)/2, y:(_vPointers[0].clientY+_vPointers[1].clientY)/2 };
  } else {
    _vPinching=false;
    _vLastX=e.clientX; _vLastY=e.clientY;
  }
  // Double-tap to zoom
  if(_vDblTimer){
    clearTimeout(_vDblTimer); _vDblTimer=null;
    if(_vScale>1){ _vScale=1; _vX=0; _vY=0; } else { _vScale=2.5; }
    _vApply(); return;
  }
  _vDblTimer=setTimeout(()=>{ _vDblTimer=null; },280);
});

imgViewerImg.addEventListener('pointermove', e=>{
  const idx=_vPointers.findIndex(p=>p.pointerId===e.pointerId);
  if(idx>=0) _vPointers[idx]=e;
  if(_vPinching && _vPointers.length===2){
    const d=_vDist(_vPointers[0],_vPointers[1]);
    _vScale=Math.max(1,Math.min(6, _vLastScale*(d/_vDist0)));
    _vApply();
  } else if(!_vPinching && _vPointers.length===1){
    _vX+=e.clientX-_vLastX; _vY+=e.clientY-_vLastY;
    _vLastX=e.clientX; _vLastY=e.clientY;
    _vApply();
  }
});

imgViewerImg.addEventListener('pointerup', e=>{
  _vPointers=_vPointers.filter(p=>p.pointerId!==e.pointerId);
  if(_vPointers.length<2) _vPinching=false;
  if(_vScale<=1){ _vScale=1; _vX=0; _vY=0; _vApply(); }
});

imgViewerImg.addEventListener('pointercancel', e=>{
  _vPointers=_vPointers.filter(p=>p.pointerId!==e.pointerId);
  _vPinching=false;
});

// ---- Tap (detail) + Long press (edit) ----
function addGestures(wrapper,content,todoId){
  let longTimer=null, moved=false, sx=0, sy=0, tapStart=0;

  function startPress(x,y){
    sx=x; sy=y; moved=false; tapStart=Date.now();
    wrapper.classList.add('long-pressing');
  }
  function cancelPress(){
    clearTimeout(longTimer);
    wrapper.classList.remove('long-pressing');
  }
  function fireLongPress(){
    wrapper.classList.remove('long-pressing');
    wrapper.classList.add('long-pressed');
    setTimeout(()=>wrapper.classList.remove('long-pressed'),350);
    openEditModal(todoId);
  }
  function fireTap(){
    openDetailModal(todoId);
  }

  // Touch
  wrapper.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startPress(t.clientX, t.clientY);
    longTimer=setTimeout(()=>{ if(!moved) fireLongPress(); },600);
  },{passive:true});

  wrapper.addEventListener('touchmove',e=>{
    const mx=Math.abs(e.touches[0].clientX-sx), my=Math.abs(e.touches[0].clientY-sy);
    if(mx>10||my>10){ moved=true; cancelPress(); }
  },{passive:true});

  wrapper.addEventListener('touchend', e=>{
    clearTimeout(longTimer);
    wrapper.classList.remove('long-pressing');
    if(!moved && Date.now()-tapStart<600){
      // Make sure the tap wasn't on checkbox, delete or restore btn
      const target=e.target;
      if(!target.closest('.checkbox') && !target.closest('.del') && !target.closest('.restore-btn')){
        fireTap();
      }
    }
  });

  // Mouse
  let mTimer=null;
  wrapper.addEventListener('mousedown', e=>{
    startPress(e.clientX, e.clientY);
    mTimer=setTimeout(fireLongPress,600);
  });
  wrapper.addEventListener('mouseup', e=>{
    clearTimeout(mTimer);
    wrapper.classList.remove('long-pressing');
    if(!moved && Date.now()-tapStart<600){
      const target=e.target;
      if(!target.closest('.checkbox') && !target.closest('.del') && !target.closest('.restore-btn')){
        fireTap();
      }
    }
  });
  wrapper.addEventListener('mouseleave',()=>{ clearTimeout(mTimer); wrapper.classList.remove('long-pressing'); });
}

async function toggleTodo(id,done){
  if(done && navigator.vibrate) navigator.vibrate(40);
  const todo=currentTodos.find(t=>t.id===id); if(!todo) return;
  try{
    const newCompletedByEmail=done?(auth.currentUser?auth.currentUser.email:null):null;
    await todosRef.doc(id).update({
      done,
      completedAt:done?firebase.firestore.FieldValue.serverTimestamp():null,
      completedByEmail:newCompletedByEmail,
      notifiedCompletion:done?false:true
    });
    if(done){
      // Zähler beim (Wieder-)Abschließen erhöhen
      await recordCompletion(true,newCompletedByEmail);
      const reportData={
        text:todo.text,
        category:todo.category||null,
        assignee:todo.assignee||null,
        completedByEmail:newCompletedByEmail,
        completedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      // Report-Eintrag nutzt dieselbe ID wie der Task -> pro Task kann es
      // in der completions-Collection immer nur genau EINEN Eintrag geben.
      // Beim erneuten Abschließen wird dieser Eintrag überschrieben statt
      // ein Duplikat anzulegen.
      await completionsRef.doc(id).set(reportData,{merge:true}).catch(()=>{});
    } else {
      // Zähler bei der Person abziehen, die den Task ursprünglich erledigt hatte
      // (nicht bei der Person, die ihn gerade wieder öffnet), und nie unter 0
      await recordCompletion(false,todo.completedByEmail);
      // Report-Eintrag entfernen, da der Task nicht mehr als erledigt gilt.
      // Sonst bleibt der alte Eintrag stehen, bis der Task erneut abgeschlossen wird.
      await completionsRef.doc(id).delete().catch(()=>{});
    }
    if(done&&todo.recurring&&todo.recurring!==''){
      const nd=nextDue(todo.dueDate,todo.recurring);
      await todosRef.add({
        text:todo.text, notes:todo.notes||null, category:todo.category||null,
        assignee:todo.assignee||null, dueDate:nd, priority:todo.priority||null,
        recurring:todo.recurring, notified:false, completedAt:null,
        photo:todo.photo||null, authorEmail:todo.authorEmail||null,
        done:false, createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }catch(e){console.error(e);}
}

async function deleteTodo(id){
  try{ await todosRef.doc(id).update({deleted:true,deletedAt:firebase.firestore.FieldValue.serverTimestamp()}); }catch(e){console.error(e);}
}

async function restoreTodo(id){
  const todo=currentTodos.find(t=>t.id===id);
  try{
    await todosRef.doc(id).update({
      deleted:false,
      deletedAt:null,
      done:false,
      completedAt:null,
      completedByEmail:null,
      notifiedCompletion:true
    });
    if(todo && todo.done){
      // War der Task erledigt, als er gelöscht wurde: Zähler zurücknehmen
      // und Report-Eintrag entfernen, da er jetzt wieder offen ist.
      await recordCompletion(false,todo.completedByEmail);
      await completionsRef.doc(id).delete().catch(()=>{});
    }
  }catch(e){console.error(e);}
}

// ---- Aufräumen (manuell) ----
let cleanupCandidates = [];

function formatDateTime(ts){
  if(!ts) return '';
  const ms = ts.toMillis ? ts.toMillis() : ts;
  return new Date(ms).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' + new Date(ms).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

cleanupPreviewBtn.addEventListener('click', () => {
  const days = parseInt(cleanupThreshold.value);
  const cutoff = Date.now() - days * 86400000;

  cleanupCandidates = currentTodos.filter(t => {
    if (t.deleted && t.deletedAt) {
      const ms = t.deletedAt.toMillis ? t.deletedAt.toMillis() : 0;
      return ms <= cutoff;
    }
    if (t.done && t.completedAt) {
      const ms = t.completedAt.toMillis ? t.completedAt.toMillis() : 0;
      return ms <= cutoff;
    }
    return false;
  });

  cleanupReportBody.innerHTML = '';
  if (cleanupCandidates.length === 0) {
    cleanupReportBody.innerHTML = '<div class="report-empty">Nichts zum Aufräumen gefunden.</div>';
  } else {
    cleanupCandidates.forEach(t => {
      const row = document.createElement('div');
      row.className = 'report-row';
      const who = t.deleted ? 'Gelöscht' : getDisplayName(t.completedByEmail);
      const when = t.deleted ? formatDateTime(t.deletedAt) : formatDateTime(t.completedAt);
      row.innerHTML = '<span class="r-text">'+escapeHtml(t.text)+'</span><span class="r-who">'+escapeHtml(who)+'<br><span class="r-date">'+when+'</span></span>';
      cleanupReportBody.appendChild(row);
    });
  }
  cleanupModal.classList.remove('hidden');document.body.classList.add('modal-open');
});

cleanupCancelBtn.addEventListener('click', () => {cleanupModal.classList.add('hidden');document.body.classList.remove('modal-open');});

cleanupConfirmBtn.addEventListener('click', async () => {
  if (cleanupCandidates.length === 0) { cleanupModal.classList.add('hidden');document.body.classList.remove('modal-open'); return; }
  const batch = db.batch();
  cleanupCandidates.forEach(t => batch.delete(todosRef.doc(t.id)));
  try {
    await batch.commit();
  } catch (e) { console.error('Aufräumen fehlgeschlagen', e); }
  cleanupCandidates = [];
  cleanupModal.classList.add('hidden');document.body.classList.remove('modal-open');
});

// ---- Hilfsfunktion: ISO-Wochenschlüssel für einen Timestamp ----
function getWeekKeyForTs(ts){
  const ms = ts && ts.toMillis ? ts.toMillis() : (ts || 0);
  const d = new Date(ms);
  const utc = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = utc.getUTCDay() || 7;
  utc.setUTCDate(utc.getUTCDate() + 4 - dow);
  const y = utc.getUTCFullYear();
  const wk = Math.ceil(((utc - new Date(Date.UTC(y,0,1))) / 86400000 + 1) / 7);
  return y + '-W' + String(wk).padStart(2,'0');
}

// ---- Wochenanfang (Montag 00:00 Uhr) für die aktuelle Woche ----
function currentWeekStart(){
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dow = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() - (dow - 1));
  return d; // Montag 00:00 UTC
}

// ---- Wochenbezeichnung (z. B. "KW 28 · 07.07 – 13.07.2025") ----
function weekLabel(weekKey){
  const [y, w] = weekKey.split('-W').map(Number);
  // Montag der Woche berechnen
  const jan4 = new Date(Date.UTC(y, 0, 4));
  const dow4 = jan4.getUTCDay() || 7;
  const monday = new Date(jan4);
  monday.setUTCDate(jan4.getUTCDate() - (dow4 - 1) + (w - 1) * 7);
  const sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  const fmt = d => d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', timeZone:'UTC'});
  return 'KW\u00a0' + w + '\u00a0\u00b7\u00a0' + fmt(monday) + '\u00a0\u2013\u00a0' + fmt(sunday) + '.' + y;
}

// ---- Report: Wer hat was erledigt ----
async function openReportForEmail(filterEmail, filterName){
  reportBody.innerHTML = '<div class="report-empty">Lädt...</div>';
  reportModal.classList.remove('hidden');document.body.classList.add('modal-open');
  reportModal.querySelector('h2').textContent = filterName ? 'Report: '+filterName : 'Wer hat was erledigt';
  try {
    const snap = await completionsRef.orderBy('completedAt','desc').limit(500).get();
    reportBody.innerHTML = '';
    const docs = [];
    snap.forEach(doc => {
      const d = doc.data();
      if(!filterEmail || d.completedByEmail === filterEmail) docs.push(d);
    });
    if (docs.length === 0) {
      reportBody.innerHTML = '<div class="report-empty">Keine Einträge gefunden.</div>';
      return;
    }

    if (filterEmail) {
      // ---- Personen-Report: nur aktuelle Woche ----
      const weekStart = currentWeekStart();
      const thisDocs = docs.filter(d => {
        const ms = d.completedAt && d.completedAt.toMillis ? d.completedAt.toMillis() : 0;
        return ms >= weekStart.getTime();
      });
      if (thisDocs.length === 0) {
        reportBody.innerHTML = '<div class="report-empty">Diese Woche noch nichts erledigt.</div>';
        return;
      }
      // Nach Datum aufsteigend
      thisDocs.sort((a,b) => {
        const am = a.completedAt && a.completedAt.toMillis ? a.completedAt.toMillis() : 0;
        const bm = b.completedAt && b.completedAt.toMillis ? b.completedAt.toMillis() : 0;
        return am - bm;
      });
      thisDocs.forEach(d => {
        const row = document.createElement('div');
        row.className = 'report-row';
        row.innerHTML = '<span class="r-text">'+escapeHtml(d.text)+(d.category?'<br><span style="font-size:11px;color:var(--sub)">'+escapeHtml(d.category)+'</span>':'')+'</span>'
          +'<span class="r-who" style="text-align:right"><span class="r-date">'+formatDateTime(d.completedAt)+'</span></span>';
        reportBody.appendChild(row);
      });
    } else {
      // ---- Gesamt-Report: nach Wochen gruppiert, innerhalb jeder Woche nach User dann Datum ----
      // Wochen-Gruppen sammeln
      const weekMap = {};
      docs.forEach(d => {
        const wk = getWeekKeyForTs(d.completedAt);
        if (!weekMap[wk]) weekMap[wk] = [];
        weekMap[wk].push(d);
      });
      // Stats für alle betroffenen Wochen laden
      const sortedWeeks = Object.keys(weekMap).sort((a,b) => b.localeCompare(a));
      const statsCache = {};
      await Promise.all(sortedWeeks.map(async wk => {
        try {
          const s = await statsRef.doc(wk).get();
          statsCache[wk] = s.exists ? s.data() : {};
        } catch(e) { statsCache[wk] = {}; }
      }));

      sortedWeeks.forEach(wk => {
        // Wochen-Header mit Wochenstand
        const statsData = statsCache[wk] || {};
        const statParts = Object.entries(statsData)
          .map(([key, count]) => {
            const email = knownUsers[key] || key;
            return escapeHtml(getDisplayName(email)) + ':&thinsp;<strong>' + count + '&thinsp;✓</strong>';
          })
          .join('&ensp;·&ensp;');

        const header = document.createElement('div');
        header.style.cssText = 'display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:14px 0 6px;border-bottom:2px solid var(--line);margin-bottom:4px;';
        header.innerHTML = '<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sage);white-space:nowrap;">'
          + escapeHtml(weekLabel(wk)) + '</span>'
          + (statParts ? '<span style="font-size:11px;color:var(--sub);text-align:right;flex-shrink:0;">' + statParts + '</span>' : '');
        reportBody.appendChild(header);

        // Einträge: erst nach User-Name, dann nach Datum aufsteigend
        const entries = weekMap[wk].slice().sort((a,b) => {
          const na = getDisplayName(a.completedByEmail).toLowerCase();
          const nb = getDisplayName(b.completedByEmail).toLowerCase();
          if (na !== nb) return na.localeCompare(nb, 'de');
          const am = a.completedAt && a.completedAt.toMillis ? a.completedAt.toMillis() : 0;
          const bm = b.completedAt && b.completedAt.toMillis ? b.completedAt.toMillis() : 0;
          return am - bm;
        });

        entries.forEach(d => {
          const row = document.createElement('div');
          row.className = 'report-row';
          const who = getDisplayName(d.completedByEmail);
          row.innerHTML = '<span class="r-text">'+escapeHtml(d.text)+(d.category?'<br><span style="font-size:11px;color:var(--sub)">'+escapeHtml(d.category)+'</span>':'')+'</span>'
            +'<span class="r-who" style="text-align:right">'+escapeHtml(who)+'<br><span class="r-date">'+formatDateTime(d.completedAt)+'</span></span>';
          reportBody.appendChild(row);
        });
      });
    }
  } catch (e) {
    reportBody.innerHTML = '<div class="report-empty">Fehler beim Laden.</div>';
    console.error(e);
  }
}


viewReportBtn.addEventListener('click', ()=>openReportForEmail(null, null));
closeReportBtn.addEventListener('click', () => { reportModal.classList.add('hidden');document.body.classList.remove('modal-open'); reportModal.querySelector('h2').textContent='Wer hat was erledigt'; });

resetStatsBtn.addEventListener('click', async () => {
  if (!confirm('Wochen-Zähler wirklich zurücksetzen?')) return;
  try {
    const week = getWeekKey();
    await statsRef.doc(week).delete();
  } catch (e) { console.error('Zurücksetzen fehlgeschlagen', e); }
});

// ---- Push ----
let messaging; try{messaging=firebase.messaging();}catch(e){messaging=null;}
function setPushStatus(t, active=false){
  if(active){
    enablePushBtn.classList.add('push-active');
    enablePushBtn.textContent='Push aktiv';
    enablePushBtn.disabled=true;
  } else {
    enablePushBtn.classList.remove('push-active');
    enablePushBtn.textContent='Push-Benachrichtigungen aktivieren';
    enablePushBtn.disabled=false;
  }
}
async function registerPush(){
  if(!messaging){setPushStatus('Push nicht unterstützt.');return;}
  if(typeof Notification==='undefined'){setPushStatus('Benachrichtigungen werden in diesem Browser nicht unterstützt.');return;}
  try{
    const reg=await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){setPushStatus('Benachrichtigungen nicht erlaubt.');return;}
    const token=await messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
    if(token){
      await tokensRef.doc(token).set({token,email:auth.currentUser?.email||null,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      setPushStatus('Push-Benachrichtigungen aktiv ✓', true);
    }else{ setPushStatus('Seite zum Home-Bildschirm hinzufügen und erneut versuchen.'); }
  }catch(e){setPushStatus('Fehler: '+e.message);}
}
enablePushBtn.addEventListener('click',registerPush);

// Beim Laden prüfen ob Push bereits erteilt wurde -> Button sofort als aktiv anzeigen
if(typeof Notification !== 'undefined' && Notification.permission === 'granted' && messaging){
  navigator.serviceWorker.ready.then(reg=>{
    messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg}).then(token=>{
      if(token) setPushStatus('Push-Benachrichtigungen aktiv ✓', true);
    }).catch(()=>{});
  }).catch(()=>{});
}
if(messaging) messaging.onMessage(()=>{});
